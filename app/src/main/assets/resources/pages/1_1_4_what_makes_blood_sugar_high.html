<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="dark light" name="color-scheme" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Title</title>
      <link rel="stylesheet" href="../css/uikit.css" />
      <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="uk-container vertical-space-between">
      <div>
        <h3>What makes blood sugar high?</h3>
        <div class="grid grid-3">
          <div class="align-center">
            <img src="../images/will_eating_carbs.png" alt="Fatigue" class="img-square" />
            <p>Eating carbs</p>
          </div>
          <div class="align-center">
            <img
              src="../images/hope_illness.png"
              alt="Blurred vision"
              class="img-square"
            />
            <p>Illness</p>
          </div>
          <div class="align-center">
            <img
              src="../images/hope_thinking.png"
              alt="Excessive thirst"
              class="img-square"
            />
            <p>Hormones</p>
          </div>
        </div>

        <div class="grid grid-2">
          <div class="align-center">
            <img src="../images/hope_stress.png" alt="Weight loss" class="img-square" />
            <p>Stress</p>
          </div>
          <div class="align-center">
            <img
              src="../images/hope_steroids.png"
              alt="Frequent urination"
              class="img-square"
            />
            <p>Steroids</p>
          </div>
        </div>
      </div>
      <div class="uk-flex uk-flex-center uk-margin-xlarge-top">
        <a class="uk-button" href="next"
          >Next
          <img class="arrow-right" src="../images/arrow_right.png" alt="arrow-right"
        /></a>
      </div>
    </div>
  </body>
  <script src="../js/uikit.js"></script>
</html>
